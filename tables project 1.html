<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Foods</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff8f0;
            text-align: center;
        }

        h1 {
            color: #d35400;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }

        td, th {
            border: 2px solid #333;
            padding: 10px;
        }

        .row1 { background-color: #ffadad; }
        .row2 { background-color: #ffd6a5; }
        .row3 { background-color: #fdffb6; }
        .row4 { background-color: #caffbf; }
        .row5 { background-color: #9bf6ff; }
        .row6 { background-color: #bdb2ff; }

        img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }

        a {
            display: block;
            margin: 20px;
        }

        .hover-grow {
            transition: transform 0.3s ease;
        }

        .hover-grow:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<a id="top"></a>

<h1>My Favorite Foods</h1>

<table>
    <tr class="row1">
        <th>Food</th>
        <th>Description</th>
        <th>Rating</th>
    </tr>

    <tr class="row2">
        <td>Pizza</td>
        <td>Cheesy, saucy, and amazing</td>
        <td>10/10</td>
    </tr>

    <tr class="row3">
        <td>Sushi</td>
        <td>Fresh and flavorful</td>
        <td>9/10</td>
    </tr>

    <tr class="row4">
        <td>Tacos</td>
        <td>Spicy and delicious</td>
        <td>10/10</td>
    </tr>

</table>

<h2>Food Gallery</h2>

<table>
    <tr>
        <td><img class="hover-grow" src="pizza.jpeg" alt="Pizza"></td>
        <td><img class="hover-grow" src="sushi.jpeg" alt="Sushi"></td>
        <td><img class="hover-grow" src="tacos.jpeg" alt="Tacos"></td>
    </tr>
</table>

<a href="#top">Return to Top ↑</a>

<a href="tables2.html">Go to Page 2 →</a>

<footer>
    <p>&copy; 2026 My Favorite Foods</p>
</footer>

</body>
</html>
